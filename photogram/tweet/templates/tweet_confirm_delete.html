{% extends "layout.html" %}

{% block title %}
 Photogram. Delete tweet
{% endblock title %}

{% block content %}

<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md rounded-2xl bg-white/60 backdrop-blur-xl border border-cyan-900/10 shadow-sm p-8 text-center">

        <div class="w-14 h-14 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4">
            <i class="ti ti-trash text-2xl text-red-600"></i>
        </div>

        <h1 class="text-lg font-bold text-[#0a4a58] mb-2">Delete this tweet?</h1>
        <p class="text-sm text-[#6ab0bc] mb-6">
            This action cannot be undone. Are you sure you want to delete this tweet?
        </p>

        <form method="post" class="flex flex-col sm:flex-row gap-3 justify-center">
            {% csrf_token %}
            <a href="{% url 'tweet_list' %}"
               class="flex items-center justify-center gap-2 text-sm font-semibold text-[#0a4a58] bg-cyan-500/10 hover:bg-cyan-500/20 px-5 py-2.5 rounded-full transition-colors order-2 sm:order-1">
                Cancel
            </a>
            <button type="submit"
               class="flex items-center justify-center gap-2 text-sm font-semibold text-white bg-red-600 hover:bg-red-700 px-5 py-2.5 rounded-full shadow-md shadow-red-900/20 hover:shadow-lg transition-all order-1 sm:order-2">
                <i class="ti ti-trash"></i>
                Delete
            </button>
        </form>

    </div>
</div>

{% endblock content %}
