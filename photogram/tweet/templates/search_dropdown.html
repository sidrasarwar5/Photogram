{% if users or tweets %}
<div class="flex flex-col gap-1 p-2">
    {% for u in users %}
    <a href="/profile/{{ u.username }}" class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-cyan-500/10 transition-colors">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-[#3dbccc] to-[#1a8fa0] flex items-center justify-center text-white font-bold text-xs">
            {{ u.username|first|upper }}
        </div>
        <span class="text-sm font-semibold text-[#0e2d35]">{{ u.username }}</span>
    </a>
    {% endfor %}
    {% for tweet in tweets %}
    <a href="{% url 'search' %}?q={{ query }}" class="flex flex-col px-3 py-2 rounded-xl hover:bg-cyan-500/10 transition-colors">
        <span class="text-xs font-semibold text-[#0a4a58]">{{ tweet.user.username }}</span>
        <span class="text-xs text-[#6ab0bc] truncate">{{ tweet.text }}</span>
    </a>
    {% endfor %}
    <a href="{% url 'search' %}?q={{ query }}" class="text-center text-xs font-semibold text-[#1a8fa0] py-2 hover:bg-cyan-500/10 rounded-xl transition-colors">
        See all results
    </a>
</div>
{% else %}
<div class="px-3 py-4 text-center text-sm text-[#6ab0bc]">No results found</div>
{% endif %}
