{% extends "layout.html" %}

{% block title %}
 Photogram. Logged out
{% endblock title %}

{% block content %}

<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md rounded-2xl bg-white/70 backdrop-blur-xl border border-cyan-900/10 shadow-lg shadow-cyan-900/5 p-8 text-center">

        <div class="w-14 h-14 mx-auto mb-4 text-2xl flex items-center justify-center rounded-2xl bg-gradient-to-br from-[#3dbccc] to-[#1a8fa0] shadow-md shadow-cyan-900/25">
            <i class="ti ti-logout text-white"></i>
        </div>

        <h1 class="text-lg font-bold text-[#0a4a58] mb-2">You've been logged out</h1>
        <p class="text-sm text-[#6ab0bc] mb-6">Thanks for visiting Photogram. See you again soon!</p>

<div class="flex flex-col sm:flex-row gap-4">
    <a href="{% url 'login' %}"
        class="inline-flex items-center justify-center gap-2 text-sm font-semibold text-white bg-gradient-to-br from-[#3dbccc] to-[#1a8fa0] px-5 py-2.5 rounded-full shadow-md shadow-cyan-900/25 hover:shadow-lg hover:-translate-y-0.5 transition-all">
        <i class="ti ti-login"></i>
        Log in again
    </a>

    <a href="{% url 'tweet_list' %}"
        class="inline-flex items-center justify-center gap-2 text-sm font-semibold text-[#0a4a58] bg-cyan-500/10 px-5 py-2.5 rounded-full hover:bg-cyan-500/20 transition-all">
        <i class="ti ti-home"></i>
        Go to home page
    </a>
</div>
        
    </div>
</div>

{% endblock content %}
